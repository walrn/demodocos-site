<script>
/* Rendu du catalogue de livres (propre à cette page — ne touche pas à site.js partagé).
   Lit la liste de la langue courante dans LIVRES, écrit les fiches, réagit au toggle EL/EN/FR.
   La lightbox est ouverte par délégation ; sa fermeture est déjà gérée par site.js. */
(function(){
  "use strict";
  const LANGS = ["el","en","fr"];
  const ZOOM  = { el:"Μεγέθυνση", en:"Enlarge", fr:"Agrandir" };

  function curLang(){
    try { const s = localStorage.getItem("demodocos-lang"); if(LANGS.includes(s)) return s; } catch(e){}
    const n = (navigator.language||"").slice(0,2).toLowerCase();
    if(LANGS.includes(n)) return n;
    return (typeof DEFAULT_LANG !== "undefined") ? DEFAULT_LANG : "en";
  }
  function esc(s){ return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function photoSrc(p){ return /^(https?:|\/)/.test(p) ? p : "assets/" + p; }

  // Un bloc = champs « titre/auteur/photo » + le reste = commentaire (paragraphes séparés par une ligne vide).
  function parseList(txt){
    return (txt||"").split(/^\s*---\s*$/m).map(block => {
      const o = { paras: [] };
      const commentLines = [];
      block.split(/\r?\n/).forEach(line => {
        const m = line.match(/^\s*(titre|auteur|photo)\s*:\s*(.*)$/i);
        if(m) o[m[1].toLowerCase()] = m[2].trim();
        else commentLines.push(line);
      });
      o.paras = commentLines.join("\n").split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);
      return o;
    }).filter(o => o.titre);
  }

  function row(b, lang){
    const t = esc(b.titre), a = esc(b.auteur);
    const cover = b.photo
      ? '<div class="cover"><button type="button" class="zoom" data-zoom aria-label="' + esc(ZOOM[lang]) + ' : ' + t + '">'
          + '<img src="' + esc(photoSrc(b.photo)) + '" alt="' + t + '" loading="lazy"></button></div>'
      : '<div class="cover is-fallback" aria-hidden="true"><img src="assets/livre-demodocos.png" alt=""></div>';
    const comment = b.paras.map(p => '<p>' + esc(p) + '</p>').join("");
    return '<article class="bookrow">' + cover
      + '<div class="bookmeta"><h3>' + t + '</h3>'
      + (a ? '<p class="byline">' + a + '</p>' : '')
      + (comment ? '<div class="comment">' + comment + '</div>' : '')
      + '</div></article>';
  }

  function renderCatalog(lang){
    const cat = document.getElementById("catalog");
    if(!cat || typeof LIVRES === "undefined") return;
    const books = parseList(LIVRES[lang] || LIVRES.en || "");
    cat.innerHTML = books.map(b => row(b, lang)).join("");
  }

  function wireLightbox(){
    const cat = document.getElementById("catalog");
    const lb  = document.getElementById("lightbox");
    if(!cat || !lb) return;
    const img = document.getElementById("lightbox-img");
    const closeBtn = document.getElementById("lightbox-close");
    cat.addEventListener("click", e => {
      const btn = e.target.closest("[data-zoom]"); if(!btn) return;
      const im = btn.querySelector("img"); if(!im) return;
      img.src = im.currentSrc || im.src; img.alt = im.alt || "";
      lb.classList.add("open"); document.body.style.overflow = "hidden";
      if(closeBtn) closeBtn.focus();
    });
  }

  function init(){
    renderCatalog(curLang());
    wireLightbox();
    document.querySelectorAll(".langs button").forEach(b => {
      b.addEventListener("click", () => renderCatalog(b.dataset.lang));
    });
  }
  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();
</script>
